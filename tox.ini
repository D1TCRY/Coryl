[tox]
min_version = 4.20
env_list =
    core
    all
    pydantic
    diskcache
    fsspec
    platform
    watch
    lock

[testenv]
package = wheel
wheel_build_env = .pkg
deps =
    pytest

[testenv:core]
commands =
    python -m pytest -q tests/test_release_readiness.py tests/test_dependency_matrix.py tests/test_packaging_optional_dependencies.py

[testenv:all]
extras =
    all
commands =
    python -m pytest -q

[testenv:pydantic]
extras =
    pydantic
commands =
    python -m pytest -q tests/test_release_readiness.py tests/test_dependency_matrix.py tests/test_config_typed.py tests/test_packaging_optional_dependencies.py

[testenv:diskcache]
extras =
    diskcache
commands =
    python -m pytest -q tests/test_cache_diskcache.py tests/test_cache_diskcache_optional.py tests/test_packaging_optional_dependencies.py

[testenv:fsspec]
extras =
    fsspec
commands =
    python -m pytest -q tests/test_packaging_optional_dependencies.py tests/test_fsspec_filesystem.py tests/test_fsspec_optional.py

[testenv:platform]
extras =
    platform
commands =
    python -m pytest -q tests/test_dependency_matrix.py tests/test_packaging_optional_dependencies.py tests/test_coryl.py -k for_app

[testenv:watch]
extras =
    watch
commands =
    python -m pytest -q tests/test_config_watch.py tests/test_packaging_optional_dependencies.py

[testenv:lock]
extras =
    lock
commands =
    python -m pytest -q tests/test_packaging_optional_dependencies.py tests/test_coryl.py::CorylTests::test_lock_context_manager_creates_and_uses_lock_file tests/test_coryl.py::CorylTests::test_lock_dependency_missing_error_is_clear tests/test_coryl.py::CorylTests::test_lock_timeout_maps_to_coryl_lock_timeout_error
